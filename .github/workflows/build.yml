name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Compile ldid
          git clone https://github.com/ProcursusTeam/ldid
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          
          # Setup Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          
          # Setup folders
          mkdir -p /home/runner/theos/sdks /home/runner/theos/toolchain/linux/iphone
          
          # FIXED SDK URL
          curl -L -o sdks.tar.gz https://github.com/theos/sdks/archive/refs/tags/latest.tar.gz
          tar -zxf sdks.tar.gz -C /home/runner/theos/sdks --strip-components=1
          
          # FIXED TOOLCHAIN URL (Directly from Procursus for linux-amd64)
          curl -L -o toolchain.tar.gz https://github.com/theos/toolchain/releases/download/v2.0/linux-iphone-clang.tar.gz
          tar -zxf toolchain.tar.gz -C /home/runner/theos/toolchain/linux/iphone --strip-components=1
          
          rm sdks.tar.gz toolchain.tar.gz
          
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
