name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # 1. Compile ldid
          git clone https://github.com/ProcursusTeam/ldid
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          
          # 2. Setup Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          
          # 3. Add the Toolchain (The missing piece!)
          mkdir -p /home/runner/theos/toolchain/linux/iphone
          wget -q https://github.com/theos/toolchain/releases/latest/download/linux-iphone-clang.tar.gz
          tar -zxf linux-iphone-clang.tar.gz -C /home/runner/theos/toolchain/linux/iphone --strip-components=1
          
          # 4. Add the SDKs
          mkdir -p /home/runner/theos/sdks
          wget -q https://github.com/theos/sdks/archive/master.tar.gz
          tar -zxf master.tar.gz -C /home/runner/theos/sdks --strip-components=1
          rm master.tar.gz
          
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
