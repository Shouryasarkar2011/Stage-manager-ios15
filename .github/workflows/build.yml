name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Setup Directories
          export THEOS=/home/runner/theos
          sudo rm -rf $THEOS
          mkdir -p $THEOS
          
          # 1. Download Theos via tarball
          curl -L https://github.com/theos/theos/tarball/master | tar -xz -C $THEOS --strip-components=1
          
          # 2. Setup SDKs
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C $THEOS/sdks --strip-components=1
          
          # 3. Setup Toolchain (The Bulletproof Way)
          # We check the content-type first to make sure we aren't downloading an error page
          mkdir -p $THEOS/toolchain/linux/iphone
          TOOLCHAIN_URL="https://github.com/theos/toolchain/releases/download/v2.0/linux-iphone-clang.tar.gz"
          
          echo "Downloading toolchain from $TOOLCHAIN_URL..."
          curl -L -f -o toolchain.tar.gz $TOOLCHAIN_URL
          
          # Validate it's actually a gzip file
          if file toolchain.tar.gz | grep -q "gzip"; then
              tar -xzf toolchain.tar.gz -C $THEOS/toolchain/linux/iphone --strip-components=1
          else
              echo "Error: Downloaded file is not a valid gzip archive! Contents:"
              cat toolchain.tar.gz
              exit 1
          fi
          
          # 4. Install ldid
          if ! command -v ldid &> /dev/null; then
             git clone https://github.com/ProcursusTeam/ldid
             cd ldid && make && sudo cp ldid /usr/bin/ldid
          fi
          
          # Set Env
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
