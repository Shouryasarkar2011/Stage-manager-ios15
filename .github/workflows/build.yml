name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Use one standard location
          export THEOS=/home/runner/theos
          
          # Clone Theos properly
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # Setup SDKs
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C $THEOS/sdks --strip-components=1
          
          # Setup Toolchain
          mkdir -p $THEOS/toolchain/linux/iphone
          git clone --depth=1 https://github.com/theos/toolchain.git $THEOS/toolchain/linux/iphone
          
          # Install ldid
          git clone --recursive https://github.com/ProcursusTeam/ldid
          cd ldid && make && sudo cp ldid /usr/bin/ldid
          
          # Save THEOS path to environment
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          # Go to your project folder
          cd $GITHUB_WORKSPACE
          
          # Verify structure
          ls -F
          
          # Build it
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
