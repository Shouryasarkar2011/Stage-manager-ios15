name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos (The Official Way)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean up any remnants
          sudo rm -rf /home/runner/theos_build
          
          # Install via the official toolchain script
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
          # Move it to the location you expect, or just export the path
          # The installer usually puts it in /opt/theos or ~/theos
          # Let's point THEOS to where it actually landed
          echo "THEOS=/home/runner/theos" >> $GITHUB_ENV
          
          # Double check if ldid is installed, if not, install it
          if ! command -v ldid &> /dev/null; then
             git clone https://github.com/ProcursusTeam/ldid
             cd ldid
             git submodule update --init --recursive
             make
             sudo cp ldid /usr/bin/ldid
          fi

      - name: Build the Tweak
        run: |
          # 1. Ensure THEOS is set
          export THEOS=/home/runner/theos_build
          
          # 2. Hard verify that the directory is actually populated
          echo "Checking if makefiles exist..."
          if [ ! -f "$THEOS/makefiles/tweak.mk" ]; then
            echo "THEOS is broken! Fixing..."
            rm -rf $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
          fi
          
          # 3. Double check the submodules (this is often why makefiles are missing)
          cd $THEOS
          git submodule update --init --recursive
          
          # 4. Final sanity check
          ls -la $THEOS/makefiles/tweak.mk
          
          # 5. Run the build
          make package



      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
