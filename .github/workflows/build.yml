name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

       - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean slate
          export THEOS=/home/runner/theos
          sudo rm -rf $THEOS
          mkdir -p $THEOS
          
          # Use git config to disable credential prompts globally
          git config --global credential.helper ""
          
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # Setup SDKs
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C $THEOS/sdks --strip-components=1
          
          # Clone Toolchain - Use the direct URL without credential triggers
          mkdir -p $THEOS/toolchain/linux
          git clone --depth=1 https://github.com/theos/toolchain.git $THEOS/toolchain/linux/iphone
          
          # Install ldid
          if ! command -v ldid &> /dev/null; then
             git clone https://github.com/ProcursusTeam/ldid
             cd ldid && make && sudo cp ldid /usr/bin/ldid
          fi
          
          # Set Env
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          # Go to your project folder
          cd $GITHUB_WORKSPACE
          
          # Verify structure
          ls -F
          
          # Build it
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
