name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean up previous attempts to avoid "already exists" errors
          rm -rf ldid /home/runner/theos
          
          # 1. Compile ldid
          git clone https://github.com/ProcursusTeam/ldid
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          cd ..
          
          # 2. Setup Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          
          # 3. Setup SDKs properly
          mkdir -p /home/runner/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git /home/runner/theos/sdks
          
          # 4. Setup Toolchain
          mkdir -p /home/runner/theos/toolchain/linux
          git clone --depth=1 https://github.com/theos/toolchain.git /home/runner/theos/toolchain/linux/iphone
          
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
