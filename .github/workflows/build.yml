name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Compile ldid
          git clone https://github.com/ProcursusTeam/ldid
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          
          # Setup Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          
          # Setup folders
          mkdir -p /home/runner/theos/sdks /home/runner/theos/toolchain/linux/iphone
          
          # Force a different source for SDKs and Toolchain
          # We use wget with --no-check-certificate to bypass any SSL handshake weirdness
          wget -qO - https://github.com/theos/sdks/tarball/master | tar -zxf - -C /home/runner/theos/sdks --strip-components=1
          wget -qO - https://github.com/theos/toolchain/releases/download/v2.0/linux-iphone-clang.tar.gz | tar -zxf - -C /home/runner/theos/toolchain/linux/iphone
          
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
