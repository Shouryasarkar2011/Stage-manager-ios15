name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean up EVERYTHING
          rm -rf ldid /home/runner/theos /home/runner/theos_build
          
          # 1. Compile ldid
          git clone https://github.com/ProcursusTeam/ldid
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          cd ..
          
          # 2. Setup Theos in a NEW location
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos_build
          
          # 3. Fresh SDK clone into the new location
          git clone --depth=1 https://github.com/theos/sdks.git /home/runner/theos_build/sdks
          
          # 4. Fresh Toolchain clone
          mkdir -p /home/runner/theos_build/toolchain
          git clone --depth=1 https://github.com/theos/toolchain.git /home/runner/theos_build/toolchain/linux-iphone-clang
          
          # Link it
          mkdir -p /home/runner/theos_build/toolchain/linux
          ln -s /home/runner/theos_build/toolchain/linux-iphone-clang /home/runner/theos_build/toolchain/linux/iphone
          
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos_build
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos_build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
