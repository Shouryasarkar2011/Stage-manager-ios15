name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean setup
          export THEOS=/home/runner/theos
          mkdir -p $THEOS
          
          # Official Theos installation via their setup script
          # This is the most reliable way to get the toolchain and SDKs
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
          # The installer usually puts it in /opt/theos, move it or link it
          # Just in case it put it elsewhere, let's use what it created
          if [ -d "/opt/theos" ]; then
            sudo mv /opt/theos $THEOS
          fi
          
          # Set Env
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
