name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean slate
          export THEOS=/home/runner/theos
          sudo rm -rf $THEOS
          mkdir -p $THEOS
          
          # 1. Disable the credential helper so it stops asking for a username
          git config --global credential.helper ""
          
          # 2. Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 3. Setup SDKs
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C $THEOS/sdks --strip-components=1
          
          # 4. Clone Toolchain - Using the 'url.' trick to force non-interactive mode
          # This tells git to treat these requests as public/non-auth
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          mkdir -p $THEOS/toolchain/linux
          git clone --depth=1 https://github.com/theos/toolchain.git $THEOS/toolchain/linux/iphone
          
          # 5. Install ldid
          if ! command -v ldid &> /dev/null; then
             git clone https://github.com/ProcursusTeam/ldid
             cd ldid && make && sudo cp ldid /usr/bin/ldid
          fi
          
          # 6. Set Env
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
