name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # 1. Clean Slate
          sudo rm -rf /home/runner/theos_build
          mkdir -p /home/runner/theos_build
          
          # 2. Compile ldid
          if [ ! -d "ldid" ]; then git clone https://github.com/ProcursusTeam/ldid; fi
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          cd ..
          
          # 3. Setup Theos
          cd /home/runner/theos_build
          git init
          git remote add origin https://github.com/theos/theos.git
          git fetch --depth 1 origin master
          git checkout master
          git submodule update --init --recursive
          
          # 4. Reliable SDK/Toolchain Setup
          # SDKs via tarball (this was working for you)
          mkdir -p /home/runner/theos_build/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C /home/runner/theos_build/sdks --strip-components=1
          
          # Toolchain via Git (The stable way)
          mkdir -p /home/runner/theos_build/toolchain
          git clone --depth=1 https://github.com/theos/toolchain.git /home/runner/theos_build/toolchain/linux-iphone-clang
          
          # Ensure path exists for Theos
          mkdir -p /home/runner/theos_build/toolchain/linux
          ln -s /home/runner/theos_build/toolchain/linux-iphone-clang /home/runner/theos_build/toolchain/linux/iphone
          
          # Export for next steps
          echo "THEOS=/home/runner/theos_build" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos_build
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos_build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
