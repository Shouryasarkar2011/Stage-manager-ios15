name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # 1. Brutally nuke everything
          # We use -rf to force delete without asking for confirmation
          sudo rm -rf /home/runner/theos_build
          mkdir -p /home/runner/theos_build
          
          # 2. Compile ldid
          # We only clone it if it's not already there
          if [ ! -d "ldid" ]; then git clone https://github.com/ProcursusTeam/ldid; fi
          cd ldid
          git submodule update --init --recursive
          make
          sudo cp ldid /usr/bin/ldid
          cd ..
          
          # 3. Setup Theos - force it into the directory
          # Instead of cloning into it, we init it
          cd /home/runner/theos_build
          git init
          git remote add origin https://github.com/theos/theos.git
          git fetch --depth 1 origin master
          git checkout master
          git submodule update --init --recursive
          
          # 4. Handle SDKs and Toolchain manually to avoid git conflicts
          # Use curl -L to follow redirects and output to a temp file, then extract
          mkdir -p /home/runner/theos_build/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C /home/runner/theos_build/sdks --strip-components=1
          
          mkdir -p /home/runner/theos_build/toolchain/linux/iphone
          curl -L https://github.com/theos/toolchain/releases/download/v2.0/linux-iphone-clang.tar.gz | tar -xz -C /home/runner/theos_build/toolchain/linux/iphone

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos_build
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean
          make package
        env:
          THEOS: /home/runner/theos_build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
