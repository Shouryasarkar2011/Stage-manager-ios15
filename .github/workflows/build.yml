name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Setup Theos
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          
          # Setup Toolchain
          wget https://github.com/theos/toolchain/releases/latest/download/linux-iphone-clang.tar.gz
          tar -zxf linux-iphone-clang.tar.gz -C /home/runner/theos --strip-components=1

      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          # Theos often comes with its own ldid-handling logic if the toolchain is correct
          make clean
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
