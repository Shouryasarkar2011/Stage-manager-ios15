name: Build Tweak

on: [push]

jobs:
  build:
    name: Build Tweak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang git libplist-dev libssl-dev
          
          # Clean slate
          export THEOS=/home/runner/theos
          sudo rm -rf $THEOS
          mkdir -p $THEOS
          
          # 1. Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Setup SDKs (using tarball)
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/tarball/master | tar -xz -C $THEOS/sdks --strip-components=1
          
          # 3. Setup Toolchain (using tarball instead of git clone)
          # This avoids the "fatal: could not read Username" error entirely
          mkdir -p $THEOS/toolchain/linux/iphone
          curl -L https://github.com/theos/toolchain/releases/download/v2.0/linux-iphone-clang.tar.gz | tar -xz -C $THEOS/toolchain/linux/iphone
          
          # 4. Install ldid
          if ! command -v ldid &> /dev/null; then
             git clone https://github.com/ProcursusTeam/ldid
             cd ldid && make && sudo cp ldid /usr/bin/ldid
          fi
          
          # 5. Set Env
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build the Tweak
        run: |
          cd $GITHUB_WORKSPACE
          make package
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-deb
          path: packages/*.deb
